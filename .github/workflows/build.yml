name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
    
    - name: Create Flutter project and copy files
      run: |
        # Create temp Flutter project
        flutter create --project-name receipt_generator temp_project
        
        # Copy Android/iOS native files
        cp -r temp_project/android .
        cp -r temp_project/ios .
        
        # Fix Kotlin version
        sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle || true
        sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.10'/" android/build.gradle || true
        
        # Clean temp project
        rm -rf temp_project/android
        rm -rf temp_project/ios
        rm -rf temp_project/test
        
        # Copy our app files
        cp -r lib/* temp_project/lib/ 2>/dev/null || true
        cp pubspec.yaml temp_project/
        
        # Replace the project folder
        rm -rf lib
        mv temp_project receipt_app
        
        # Move to root
        mv receipt_app/* .
        rm -rf receipt_app
        
        # Install dependencies
        flutter pub get
        
        # Run build runner for Hive with verbose output
        echo "Running build_runner..."
        flutter pub run build_runner build --delete-conflicting-outputs || {
          echo "Build runner failed. Continuing anyway..."
        }
        
        # List generated files
        echo "Generated files:"
        find lib -name "*.g.dart" || echo "No .g.dart files found"
    
    - run: flutter build apk --release --verbose
    
    - uses: actions/upload-artifact@v4
      with:
        name: receipt-app
        path: build/app/outputs/flutter-apk/app-release.apk