name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.24.0'
    
    - name: Create Flutter project structure
      run: |
        flutter create --project-name receipt_generator temp_project
        cp temp_project/lib/main.dart lib/main.dart
        cp -r temp_project/android .
        cp -r temp_project/ios .
        rm -rf temp_project
        
        # Fix Kotlin version in settings.gradle (newer Flutter projects)
        if [ -f android/settings.gradle ]; then
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.10"/' android/settings.gradle
        fi
        
        # Fix Kotlin version in build.gradle (older Flutter projects)
        if [ -f android/build.gradle ]; then
          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.10'/" android/build.gradle
        fi
        
        # Fix Gradle version compatibility
        if [ -f android/gradle/wrapper/gradle-wrapper.properties ]; then
          sed -i 's/distributionUrl=.*/distributionUrl=https\:\/\/services.gradle.org\/distributions\/gradle-8.0-all.zip/' android/gradle/wrapper/gradle-wrapper.properties
        fi
    
    - run: flutter pub get
    
    - name: Run build runner
      run: flutter pub run build_runner build --delete-conflicting-outputs
    
    - run: flutter build apk --release
    
    - uses: actions/upload-artifact@v4
      with:
        name: receipt-app
        path: build/app/outputs/flutter-apk/app-release.apk